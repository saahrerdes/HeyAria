<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aria</title>

<style>

body{
margin:0;
font-family: system-ui, -apple-system, Arial;
background:#f6f7fb;
height:100vh;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:white;
border-right:1px solid #e5e7eb;
display:flex;
flex-direction:column;
padding:14px;
gap:10px;
}

.logo{
font-weight:700;
font-size:18px;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

/* ROBÔ FOFO */

.robot{
width:34px;
height:28px;
background:linear-gradient(135deg,#7c83ff,#8b5cf6);
border-radius:14px;
position:relative;
}

/* ANTENAS */
.robot:before{
content:"";
position:absolute;
width:4px;
height:10px;
background:#8b5cf6;
left:8px;
top:-8px;
border-radius:4px;
box-shadow:14px 0 0 #8b5cf6;
}

/* OLHOS ESTRELA */
.robot:after{
content:"";
position:absolute;
width:9px;
height:9px;
background:white;
border-radius:50%;
left:7px;
top:9px;
box-shadow:
13px 0 0 white,
2px 2px 0 1px #fff,
15px 2px 0 1px #fff;
}

/* CHAT */

.chat{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
background:white;
}

.top{
padding:14px;
border-bottom:1px solid #eee;
display:flex;
align-items:center;
gap:10px;
background:white;
}

/* AVATAR */

.avatar{
width:46px;
height:38px;
background:linear-gradient(135deg,#7c83ff,#8b5cf6);
border-radius:16px;
position:relative;
}

/* ANTENAS */
.avatar:before{
content:"";
position:absolute;
width:5px;
height:12px;
background:#8b5cf6;
left:10px;
top:-9px;
border-radius:6px;
box-shadow:18px 0 0 #8b5cf6;
}

/* OLHOS BRILHANTES */
.avatar:after{
content:"";
position:absolute;
width:13px;
height:13px;
background:white;
border-radius:50%;
left:9px;
top:12px;
box-shadow:
15px 0 0 white,
3px 3px 0 2px rgba(255,255,255,.9),
18px 3px 0 2px rgba(255,255,255,.9);
}

.newchat{
background:#2563eb;
color:white;
border:none;
padding:10px;
border-radius:12px;
cursor:pointer;
}

.menu{
display:flex;
flex-direction:column;
gap:6px;
margin-top:10px;
}

.item{
padding:10px;
border-radius:10px;
cursor:pointer;
}

.item:hover{
background:#f3f4f6;
}

.search{
padding:10px;
border-radius:10px;
border:1px solid #e5e7eb;
margin-top:auto;
}

.name{
font-weight:600;
}

.sub{
font-size:12px;
color:#6b7280;
}

.messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
background:#f9fafb;
}

.msg{
padding:12px 16px;
border-radius:16px;
max-width:70%;
white-space:pre-wrap;
animation:fade .2s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(4px)}
to{opacity:1}
}

.user{
background:#2563eb;
color:white;
align-self:flex-end;
}

.bot{
background:white;
border:1px solid #e5e7eb;
align-self:flex-start;
}

.input{
display:flex;
padding:12px;
gap:8px;
border-top:1px solid #eee;
background:white;
}

input{
flex:1;
padding:12px;
border-radius:20px;
border:1px solid #e5e7eb;
}

.send{
background:#2563eb;
color:white;
border:none;
padding:10px 16px;
border-radius:20px;
}

.mic{
background:#06b6d4;
color:white;
border:none;
padding:10px;
border-radius:50%;
}

.typing{
font-size:12px;
color:#6b7280;
padding:0 20px;
display:none;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
<div class="robot"></div>
Aria
</div>

<button class="newchat">+ Novo chat</button>

<div class="menu">
<div class="item">📚 Estudar para teste</div>
<div class="item">💬 Conversação</div>
<div class="item">🌎 Praticar idioma</div>
<div class="item">✍️ Escrever texto</div>
<div class="item">🧠 Corrigir pronúncia</div>
</div>

<input class="search" placeholder="Procurar chat...">

</div>

<div class="chat">

<div class="top">
<div class="avatar"></div>
<div>
<div class="name">Aria</div>
<div class="sub">Assistente de voz e pronúncia inteligente</div>
</div>
</div>

<div class="messages" id="messages"></div>

<div class="typing" id="typing">
Aria está ouvindo...
</div>

<div class="input">
<input id="text" placeholder="Fale ou escreva com a Aria..."/>
<button class="send" onclick="send()">Enviar</button>
<button class="mic" id="record">🎤</button>
</div>

<audio id="audio" style="display:none"></audio>

</div>

<script>

/* tudo igual */

let userId=localStorage.getItem("userId")

if(!userId){
userId=Math.random().toString(36)
localStorage.setItem("userId",userId)
}

function add(text,type){
const div=document.createElement("div")
div.className="msg "+type
div.innerText=text
messages.appendChild(div)
messages.scrollTop=messages.scrollHeight
}

async function send(){

const text=document.getElementById("text").value
document.getElementById("text").value=""

if(!text) return

add(text,"user")

typing.style.display="block"

const res=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text,
userId
})
})

const data=await res.json()

typing.style.display="none"

add(data.reply,"bot")

speak(data.reply)

}

async function speak(text){

const res=await fetch("/speak",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({text})
})

const blob=await res.blob()

const url=URL.createObjectURL(blob)

audio.src=url
audio.play()

}

let mediaRecorder
let chunks=[]
let recording=false

record.onclick=async()=>{

if(!recording){

const stream=await navigator.mediaDevices.getUserMedia({audio:true})

mediaRecorder=new MediaRecorder(stream)

mediaRecorder.start()
recording=true

record.innerText="⏹️"

mediaRecorder.ondataavailable=e=>{
chunks.push(e.data)
}

mediaRecorder.onstop=async()=>{

const blob=new Blob(chunks,{type:"audio/webm"})
chunks=[]

const form=new FormData()
form.append("audio",blob)

typing.style.display="block"

const res=await fetch("/audio",{
method:"POST",
body:form
})

const data=await res.json()

typing.style.display="none"

if(data.text){
add(data.text,"user")

if(data.reply){
add(data.reply,"bot")
speak(data.reply)
}
}

}

}else{

mediaRecorder.stop()
recording=false
record.innerText="🎤"

}

}

</script>

</body>
</html>
