/* ARIA ROBOT */

.robot{
width:34px;
height:28px;
background:linear-gradient(180deg,#ede9fe,#c7d2fe);
border-radius:14px;
position:relative;
box-shadow:0 2px 6px rgba(0,0,0,.08) inset;
}

/* antenas curvas */
.robot:before{
content:"";
position:absolute;
width:18px;
height:14px;
border-top:2px solid #93c5fd;
border-radius:50%;
left:2px;
top:-10px;
box-shadow:
16px 0 0 -0px transparent;
}

.robot:after{
content:"";
position:absolute;
width:6px;
height:6px;
background:#93c5fd;
border-radius:50%;
left:1px;
top:-4px;
box-shadow:22px 0 0 #93c5fd;
}

display:flex;
flex-direction:column;
height:100vh;
background:white;

align-items:center;
gap:10px;
background:white;
}

height:18px;

left:5px;
top:-12px;
}

content:"";
position:absolute;
width:8px;
height:8px;
background:#93c5fd;

<div class="sidebar">

<div class="logo">
<div class="robot"></div>
Aria
</div>

<button class="newchat">+ Novo chat</button>

<div class="menu">
<div class="item">📚 Estudar para teste</div>
<div class="item">💬 Conversação</div>
<div class="item">🌎 Praticar idioma</div>
<div class="item">🎤 Corrigir pronúncia</div>
</div>

<input class="search" placeholder="Procurar chat...">

</div>

<div class="chat">

<div class="top">
<div class="avatar"></div>
<div>
<div class="name">Aria</div>
<div class="sub">Assistente de voz e pronúncia</div>
</div>
</div>

<div class="messages" id="messages"></div>

<div class="typing" id="typing">
Aria está ouvindo...
</div>

<div class="input">
<input id="text" placeholder="Fale com a Aria..."/>
<button class="send" onclick="send()">Enviar</button>
<button class="mic" id="record">🎤</button>
</div>

<audio id="audio" style="display:none"></audio>

</div>

<script>
let userId=localStorage.getItem("userId")

if(!userId){
userId=Math.random().toString(36)
localStorage.setItem("userId",userId)
}

function add(text,type){
const div=document.createElement("div")
div.className="msg "+type
div.innerText=text
messages.appendChild(div)
messages.scrollTop=messages.scrollHeight
}

async function send(){
const text=document.getElementById("text").value
document.getElementById("text").value=""
if(!text) return
add(text,"user")
typing.style.display="block"

const res=await fetch("/chat",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ message:text, userId })
})

const data=await res.json()
typing.style.display="none"
add(data.reply,"bot")
speak(data.reply)
}

async function speak(text){
const res=await fetch("/speak",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({text})
})
const blob=await res.blob()
const url=URL.createObjectURL(blob)
audio.src=url
audio.play()
}

let mediaRecorder
let chunks=[]
let recording=false

record.onclick=async()=>{
if(!recording){
const stream=await navigator.mediaDevices.getUserMedia({audio:true})
mediaRecorder=new MediaRecorder(stream)
mediaRecorder.start()
recording=true
record.innerText="⏹️"

mediaRecorder.ondataavailable=e=>chunks.push(e.data)

mediaRecorder.onstop=async()=>{
const blob=new Blob(chunks,{type:"audio/webm"})
chunks=[]

const form=new FormData()
form.append("audio",blob)

typing.style.display="block"

const res=await fetch("/audio",{ method:"POST", body:form })
const data=await res.json()

typing.style.display="none"

if(data.text){
add(data.text,"user")
if(data.reply){
add(data.reply,"bot")
speak(data.reply)
}
}
}

}else{
mediaRecorder.stop()
recording=false
record.innerText="🎤"
}
}
</script>
