<script>

let mode="teacher"
let plan="free"

let usage={
messages:0,
audio:0
}

const limits={
free:{messages:20,audio:10},
pro:{messages:9999,audio:9999}
}

const messages=document.getElementById("messages")
const input=document.getElementById("textInput")
const avatar=document.getElementById("avatar")
const typing=document.getElementById("typing")

/* =========================
MODE
========================= */

function setMode(m){

mode=m

document.querySelectorAll(".side-btn")
.forEach(b=>b.classList.remove("active"))

event.target.classList.add("active")

document.getElementById("status").innerText=
mode==="teacher"
? "Modo professora ativa"
: "Modo conversa natural"

}

/* =========================
SEND
========================= */

document.getElementById("sendBtn").onclick=send
input.addEventListener("keypress",e=>{
if(e.key==="Enter") send()
})

async function send(){

if(usage.messages>=limits[plan].messages){
alert("Limite FREE atingido")
return
}

const text=input.value
if(!text) return

addMsg(text,"user")

input.value=""

usage.messages++
updateUsage()

typing.style.display="block"

const res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:text,
mode,
plan
})
})

const data=await res.json()

typing.style.display="none"

addMsg(data.reply,"bot")

speak(data.reply)

}

/* =========================
MESSAGES
========================= */
function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;

  // 1️⃣ Destacar palavras com erro
  let html = text.replace(/\*\*(.*?)\*\*/g, '<span class="error-word">$1</span>');

  // 2️⃣ Quebras de linha automáticas para separar seções
  // Considera que o OpenAI usa ": " para títulos (Ex: "Explicação:", "Tradução:")
  html = html
    .replace(/([^\n]+?:)/g, '<strong>$1</strong>') // deixa títulos em negrito
    .replace(/\n/g, '<br>');                        // substitui novas linhas por <br>

  div.innerHTML = html;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

/* =========================
SPEAK
========================= */

async function speak(text) {
  avatar.classList.add("speaking");

  const res = await fetch("/speak", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  const blob = await res.blob();
  const url = URL.createObjectURL(blob);

  // Cria um elemento <audio> com controles
  const audioEl = document.createElement("audio");
  audioEl.src = url;
  audioEl.controls = true;       // mostra play, pause, barra de progresso
  audioEl.autoplay = true;       // opcional: inicia automaticamente
  audioEl.style.marginTop = "5px";

  // Cria um balão separado para o áudio da Ária
  const div = document.createElement("div");
  div.className = "msg bot";
  div.appendChild(audioEl);

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;

  audioEl.onended = () => {
    avatar.classList.remove("speaking");
  };
}

/* =========================
MIC
========================= */

let recorder;
let chunks = [];
let recording = false;

document.getElementById("micBtn").onclick = async () => {
  if (usage.audio >= limits[plan].audio) {
    alert("Limite áudio FREE");
    return;
  }

  if (!recording) {
    // 🔹 Inicia gravação
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recorder = new MediaRecorder(stream);
    recorder.start();
    recording = true;
    chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);

  } else {
    // 🔹 Para gravação
    recorder.stop();
    recording = false;

    recorder.onstop = async () => {
      recording = false;
      usage.audio++;
      updateUsage();

      // 1️⃣ Cria blob do áudio
      const blob = new Blob(chunks, { type: "audio/webm" });

      // 2️⃣ Envia áudio para o servidor
      const form = new FormData();
      form.append("audio", blob, "gravacao.webm");

      typing.style.display = "block";

      const res = await fetch("/api/audio-eval", { method: "POST", body: form });
      const data = await res.json();
      typing.style.display = "none";

      // 3️⃣ Cria elemento de áudio do usuário
      const userAudioEl = document.createElement("audio");
      userAudioEl.src = window.location.origin + data.audioUrl;
      userAudioEl.type = "audio/webm";
      userAudioEl.controls = true;
      userAudioEl.autoplay = false;
      userAudioEl.style.marginTop = "5px";

      const userDiv = document.createElement("div");
      userDiv.className = "msg user";
      userDiv.appendChild(userAudioEl);
      messages.appendChild(userDiv);
      messages.scrollTop = messages.scrollHeight;

      // 4️⃣ Mostra resposta da Ária com áudio tipo WhatsApp
      const ariaDiv = document.createElement("div");
      ariaDiv.className = "msg bot";

      const ariaAudioEl = document.createElement("audio");
      ariaAudioEl.type = "audio/mpeg";
      const ariaBlob = await (await fetch(`/speak`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: data.reply })
      })).blob();
      ariaAudioEl.src = URL.createObjectURL(ariaBlob);
      ariaAudioEl.controls = true;
      ariaAudioEl.autoplay = false;
      ariaAudioEl.style.marginTop = "5px";

      ariaDiv.appendChild(ariaAudioEl);
      messages.appendChild(ariaDiv);
      messages.scrollTop = messages.scrollHeight;

      // 5️⃣ Mostra texto também
      addMsg(data.reply, "bot");
    };
  }
};
/* =========================
UPLOAD
========================= */

document.getElementById("uploadBtn").onclick=()=>{
document.getElementById("fileInput").click()
}

document.getElementById("fileInput").onchange=async(e)=>{

const file=e.target.files[0]

const form=new FormData()
form.append("file",file)

typing.style.display="block"

const res=await fetch("/upload",{
method:"POST",
body:form
})

const data=await res.json()

typing.style.display="none"
addMsg(data.reply,"bot")

}

/* =========================
ERROR PANEL
========================= */

function toggleErrors(){
document.getElementById("errorsPanel")
.classList.toggle("hidden")
}

/* =========================
NEW CHAT
========================= */

function newChat(){
messages.innerHTML=""
}

/* =========================
DEEP MODE
========================= */

function deepMode(){
addMsg("Modo investigar ativado","bot")
}

/* =========================
USAGE
========================= */

function updateUsage(){

document.getElementById("usageBox").innerHTML=
`
Mensagens: ${usage.messages}/${limits[plan].messages}<br>
Áudio: ${usage.audio}/${limits[plan].audio}
`

}

/* =========================
PRO
========================= */

async function upgradePro(){

const res=await fetch("/create-checkout-session",{
method:"POST"
})

const data=await res.json()

window.location.href=data.url

}

updateUsage()

</script>

<!-- ============================= -->
<!-- FIM PARTE 3 -->
<!-- ============================= -->

</body>
</html>
