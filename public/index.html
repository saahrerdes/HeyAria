<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ária</title>

<style>

body{
margin:0;
font-family: system-ui, -apple-system, Arial;
background:#f6f7fb;
height:100vh;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:white;
border-right:1px solid #e5e7eb;
display:flex;
flex-direction:column;
padding:14px;
gap:10px;
}

.logo{
font-weight:700;
font-size:18px;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.logo-avatar{
width:34px;
height:34px;
border-radius:8px;
object-fit:cover;
}

/* CHAT */

.chat{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
background:white;
}

.top{
padding:14px;
border-bottom:1px solid #eee;
display:flex;
align-items:center;
gap:10px;
background:white;
}

.avatar{
width:48px;
height:48px;
border-radius:50%;
object-fit:cover;
}

.name{
font-weight:600;
}

.sub{
font-size:12px;
color:#6b7280;
}

.newchat{
background:#2563eb;
color:white;
border:none;
padding:10px;
border-radius:12px;
cursor:pointer;
}

.menu{
display:flex;
flex-direction:column;
gap:6px;
margin-top:10px;
}

.item{
padding:10px;
border-radius:10px;
cursor:pointer;
}

.item:hover{
background:#f3f4f6;
}

.search{
padding:10px;
border-radius:10px;
border:1px solid #e5e7eb;
margin-top:auto;
}

.messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
background:#f9fafb;
}

.msg{
padding:12px 16px;
border-radius:16px;
max-width:70%;
white-space:pre-wrap;
}

.user{
background:#2563eb;
color:white;
align-self:flex-end;
}

.bot{
background:white;
border:1px solid #e5e7eb;
align-self:flex-start;
}

.input{
display:flex;
padding:12px;
gap:8px;
border-top:1px solid #eee;
background:white;
}

input{
flex:1;
padding:12px;
border-radius:20px;
border:1px solid #e5e7eb;
}

.send{
background:#2563eb;
color:white;
border:none;
padding:10px 16px;
border-radius:20px;
}

.mic{
background:#06b6d4;
color:white;
border:none;
padding:10px;
border-radius:50%;
}

.typing{
font-size:12px;
color:#6b7280;
padding:0 20px;
display:none;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="Aria.svg" class="logo-avatar">
Ária
</div>

<button class="newchat">+ Novo chat</button>

<div class="menu">
<div class="item">📚 Estudar para teste</div>
<div class="item">💬 Conversação</div>
<div class="item">🌎 Praticar idioma</div>
<div class="item">🎤 Corrigir pronúncia</div>
</div>

<input class="search" placeholder="Procurar chat...">

</div>

<div class="chat">

<div class="top">
<img src="Aria.svg" class="avatar">
<div>
<div class="name">Ária</div>
<div class="sub">Assistente de voz e pronúncia</div>
</div>
</div>

<div class="messages" id="messages"></div>

<div class="typing" id="typing">
Ária está ouvindo...
</div>

<div class="input">
<input id="text" placeholder="Fale com a Ária..."/>
<button class="send" onclick="send()">Enviar</button>
<button class="mic" id="record">🎤</button>
</div>

<audio id="audio" style="display:none"></audio>

</div>

<script>
let userId=localStorage.getItem("userId")

if(!userId){
userId=Math.random().toString(36)
localStorage.setItem("userId",userId)
}

function add(text,type){
const div=document.createElement("div")
div.className="msg "+type
div.innerText=text
messages.appendChild(div)
messages.scrollTop=messages.scrollHeight
}

async function send(){
const text=document.getElementById("text").value
document.getElementById("text").value=""
if(!text) return
add(text,"user")
typing.style.display="block"

const res=await fetch("/chat",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ message:text, userId })
})

const data=await res.json()
typing.style.display="none"
add(data.reply,"bot")
speak(data.reply)
}

async function speak(text){
const res=await fetch("/speak",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({text})
})
const blob=await res.blob()
const url=URL.createObjectURL(blob)
audio.src=url
audio.play()
}

let mediaRecorder
let chunks=[]
let recording=false

record.onclick=async()=>{
if(!recording){
const stream=await navigator.mediaDevices.getUserMedia({audio:true})
mediaRecorder=new MediaRecorder(stream)
mediaRecorder.start()
recording=true
record.innerText="⏹️"

mediaRecorder.ondataavailable=e=>chunks.push(e.data)

mediaRecorder.onstop=async()=>{
const blob=new Blob(chunks,{type:"audio/webm"})
chunks=[]

const form=new FormData()
form.append("audio",blob)

typing.style.display="block"

const res=await fetch("/audio",{ method:"POST", body:form })
const data=await res.json()

typing.style.display="none"

if(data.text){
add(data.text,"user")
if(data.reply){
add(data.reply,"bot")
speak(data.reply)
}
}
}

}else{
mediaRecorder.stop()
recording=false
record.innerText="🎤"
}
}
</script>

</body>
</html>
