<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aria</title>

<style>

body{
margin:0;
font-family: system-ui, -apple-system, Arial;
background: linear-gradient(180deg,#0f172a,#020617);
color:white;
height:100vh;
}

.chat{
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */

.top{
padding:15px;
background:rgba(0,0,0,0.3);
backdrop-filter: blur(10px);
display:flex;
align-items:center;
gap:10px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:linear-gradient(135deg,#7c3aed,#06b6d4);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.name{
font-size:16px;
font-weight:600;
}

.sub{
font-size:12px;
opacity:.6;
}

/* MESSAGES */

.messages{
flex:1;
overflow:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:12px;
border-radius:14px;
max-width:80%;
white-space:pre-wrap;
line-height:1.4;
}

.user{
background:#22c55e;
color:black;
align-self:flex-end;
border-bottom-right-radius:4px;
}

.bot{
background:#111827;
border:1px solid rgba(255,255,255,0.05);
align-self:flex-start;
border-bottom-left-radius:4px;
}

/* INPUT */

.input{
display:flex;
padding:12px;
gap:8px;
background:rgba(0,0,0,0.4);
backdrop-filter: blur(10px);
}

input{
flex:1;
padding:12px;
border-radius:20px;
border:none;
outline:none;
background:#020617;
color:white;
}

.send{
background:#7c3aed;
border:none;
color:white;
padding:10px 14px;
border-radius:20px;
}

.mic{
background:#06b6d4;
border:none;
color:white;
padding:10px 14px;
border-radius:50%;
}

/* LIMIT */

.limit{
background:#ef4444;
padding:10px;
text-align:center;
display:none;
}

/* typing */

.typing{
opacity:.5;
font-size:13px;
margin:5px;
}

</style>

</head>

<body>

<div class="chat">

<div class="top">
<div class="avatar">A</div>
<div>
<div class="name">Aria</div>
<div class="sub">Parceira de idiomas</div>
</div>
</div>

<div class="limit" id="limit">
Limite diário atingido
<button onclick="upgrade()">Upgrade PRO</button>
</div>

<div class="messages" id="messages"></div>

<div class="typing" id="typing" style="display:none">
Aria está digitando...
</div>

<div class="input">
<input id="text" placeholder="Fale com a Aria..."/>
<button class="send" onclick="send()">➤</button>
<button class="mic" id="record">🎤</button>
</div>

<audio id="audio" style="display:none"></audio>

</div>

<script>

let userId=localStorage.getItem("userId")

if(!userId){
userId=Math.random().toString(36)
localStorage.setItem("userId",userId)
}

function add(text,type){
const div=document.createElement("div")
div.className="msg "+type
div.innerText=text
messages.appendChild(div)
messages.scrollTop=messages.scrollHeight
}

/* =========================
SEND
========================= */

async function send(){

const text=document.getElementById("text").value
document.getElementById("text").value=""

if(!text) return

add(text,"user")

typing.style.display="block"

const res=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text,
userId
})
})

const data=await res.json()

typing.style.display="none"

if(data.limit){
document.getElementById("limit").style.display="block"
return
}

add(data.reply,"bot")

speak(data.reply)

}

/* =========================
VOICE
========================= */

async function speak(text){

const res=await fetch("/speak",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({text})
})

const blob=await res.blob()

const url=URL.createObjectURL(blob)

audio.src=url
audio.play()

}

/* =========================
AUDIO
========================= */

let mediaRecorder
let chunks=[]
let recording=false

record.onclick=async()=>{

if(!recording){

const stream=await navigator.mediaDevices.getUserMedia({audio:true})

mediaRecorder=new MediaRecorder(stream)

mediaRecorder.start()
recording=true

record.innerText="⏹️"

mediaRecorder.ondataavailable=e=>{
chunks.push(e.data)
}

mediaRecorder.onstop=async()=>{

const blob=new Blob(chunks,{type:"audio/webm"})
chunks=[]

const form=new FormData()
form.append("audio",blob)

typing.style.display="block"

const res=await fetch("/audio",{
method:"POST",
body:form
})

const data=await res.json()

typing.style.display="none"

if(data.text){
add(data.text,"user")

if(data.reply){
add(data.reply,"bot")
speak(data.reply)
}
}

}

}else{

mediaRecorder.stop()
recording=false
record.innerText="🎤"

}

}

/* =========================
UPGRADE
========================= */

async function upgrade(){

await fetch("/upgrade",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({userId})
})

alert("Agora você é PRO")

}

</script>

</body>
</html>
